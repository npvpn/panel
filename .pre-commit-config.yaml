repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-check
        name: ruff-strict (manual)
        alias: ruff-strict
        args: [--config, ruff-strict.toml]
        # Неблокирующий: в CI strict — informational (continue-on-error), только по
        # изменённым файлам. Здесь тоже не блокируем коммит — запуск вручную:
        # pre-commit run ruff-strict --hook-stage manual (или uv run ruff check --config ruff-strict.toml).
        stages: [manual]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-baseline
        name: mypy (baseline)
        # --no-incremental: гоняем без .mypy_cache, чтобы локальный хук всегда совпадал
        # с чистым прогоном в CI (инкрементальный кэш + pydantic «уплывает» → ложные new/fixed).
        entry: bash -c 'uv run mypy --no-incremental app | uv run mypy-baseline filter'
        language: system
        types: [python]
        pass_filenames: false
