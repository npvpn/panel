repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-check
        name: ruff-strict (staged)
        alias: ruff-strict
        args: [--config, ruff-strict.toml]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-baseline
        name: mypy (baseline)
        entry: bash -c 'uv run mypy app | uv run mypy-baseline filter'
        language: system
        types: [python]
        pass_filenames: false
