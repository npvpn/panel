<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подписка истекла</title>
    <link rel="stylesheet" href="/statics/sub/styles/index.css" />
    <link rel="icon" href="data:," />
    <script defer src="/statics/vendor/js/alpinejs.js"></script>
    <!-- <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script> -->
    <meta http-equiv="refresh" content="60" />
    
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');</style>
    <script>
      const userData = { 
        username: "{{ user.username }}", 
        status: { value: "{{ user.status.value }}" }, 
        used_traffic: Number("{{ user.used_traffic or 0 }}"), 
        data_limit: Number( "{% if not user.data_limit %}0{% else %}{{ user.data_limit }}{% endif %}" ), 
        expire: Number( "{% if not user.expire %}0{% else %}{{ user.expire }}{% endif %}" ), 
        device_limit: Number("{{ user.device_limit or 0 }}"), 
        devices_used: Number( "{% if devices %}{{ devices|length }}{% else %}0{% endif %}" )
      };

      function bytesFormat(bytes, decimals = 2) {
        if (!+bytes) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
      }

      document.addEventListener('alpine:init', () => {
        Alpine.data('subscriptionManager', () => ({
          user: userData,
          get statusText() {
            const statuses = {
              active: "Активен",
              limited: "Ограничен",
              expired: "Просрочен",
              disabled: "Отключен"
            };
            return statuses[this.user.status.value] || "Неизвестен";
          },
          get statusColor() { 
            const colors = { 
              active: 'var(--green)', 
              limited: '#eeba00', 
              expired: 'var(--red)', 
              disabled: '#7b7b7b' 
            }; 
              return colors[this.user.status.value] || '#7b7b7b'; 
          },
          get trafficText() {
            const used = bytesFormat(this.user.used_traffic);
            const limit = this.user.data_limit > 0 ? bytesFormat(this.user.data_limit) : 'Безлимит';
            return `${used}/${limit}`;
          },
          get expirationText() {
            if (this.user.expire == 0) return 'Никогда';
            return new Date(this.user.expire * 1000).toLocaleDateString('ru-RU', {
              day: '2-digit',
              month: '2-digit',
              year: 'numeric'
            });
          },
          get remainingDays() {
            if (this.user.expire == 0) return 'Безлимит';
            const remaining = Math.floor((this.user.expire * 1000 - Date.now()) / (1000 * 60 * 60 * 24));
            if (remaining < 0) return '0 дней';
            const days = remaining;
            let word = 'дней';
            if (days % 10 === 1 && days % 100 !== 11) {
              word = 'день';
            } else if (days % 10 >= 2 && days % 10 <= 4 && (days % 100 < 10 || days % 100 >= 20)) {
              word = 'дня';
            }
            return `${days} ${word}`;
          },
          get showDeviceLimit() {
            return this.user.device_limit > 0;
          },
          get deviceUsageText() {
            const used = this.user.devices_used || 0;
            const limit = this.user.device_limit;
            return `${used} из ${limit}`;
          }
        }));
      });
    </script>
  </head>

  <body>
    <div x-data="subscriptionManager" x-cloak class="wrapper">
      <div class="page-content_limited">
        <!-- HEADER -->
        <div class="page-header">
          <h2 class="page-title">Подписка истекла</h2>
          {% if web_url %}
            <p class="device-count">Войдите в личный кабинет для управления подпиской</p>
          {% endif %}
        </div>

        <!-- INFO CARD -->
        <div class="info-card">
          <div class="info-row">
            <span class="text-[#7b7b7b] tariff-info">ID</span>
            <span class="tariff-info" x-text="user.username"></span>
          </div>

          <div class="info-row">
            <span class="text-[#7b7b7b] tariff-info">Статус</span>
            <span class="tariff-info" :style="{ color: statusColor }" x-text="statusText"></span>
          </div>

          <div class="info-row">
            <span class="text-[#7b7b7b] tariff-info">Трафик</span>
            <span class="tariff-info" x-text="trafficText"></span>
          </div>

          <div class="info-row">
            <span class="text-[#7b7b7b] tariff-info">Действует до</span>
            <span class="tariff-info" x-text="expirationText"></span>
          </div>

          <div class="info-row">
            <span class="text-[#7b7b7b] tariff-info">Осталось</span>
            <span class="tariff-info" x-text="remainingDays"></span>
          </div>

          <!-- Условный рендеринг строки с устройствами -->
          <div class="info-row" x-show="showDeviceLimit">
            <span class="text-[#7b7b7b] tariff-info">Кол-во устройств</span>
            <span class="tariff-info" x-text="deviceUsageText"></span>
          </div>
        </div>

        {% if web_url %}
        <div class="button-wrapper_revoke">
          <a href="{{ web_url }}" target="_blank" rel="noopener noreferrer" class="dark-btn">
            Войти в личный кабинет
          </a>
        </div>
        {% endif %}
      </div>

      {% if show_ads %}
      <footer class="footer">
        Сайт работает на платформе 
        <a href="https://www.npvpn.net/" class="footer-link" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
          npvpn
        </a>
      </footer>
      {% endif %}
    </div>
  </body>
</html>
